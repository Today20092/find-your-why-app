<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PROTOTYPE - Windows core journey</title>
  <!-- PROTOTYPE: Three core-journey variants, switchable via ?variant=A|B|C. Delete after a direction is chosen. -->
  <style>
    :root { color-scheme: light dark; --bg:#f6f7f9; --panel:#fff; --ink:#17202a; --muted:#667085; --line:#d9dee7; --brand:#3157d5; --soft:#eef2ff; --good:#16724a; --warn:#8a5200; --radius:16px; font:16px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); }
    button,textarea { font:inherit; }
    button { cursor:pointer; }
    button:focus-visible, textarea:focus-visible, a:focus-visible { outline:3px solid #ffbf47; outline-offset:2px; }
    .skip { position:fixed; left:12px; top:-60px; z-index:20; background:var(--ink); color:var(--panel); padding:10px 14px; border-radius:8px; }
    .skip:focus { top:12px; }
    .shell { min-height:100vh; padding-bottom:88px; }
    .brand { font-size:1.2rem; font-weight:800; letter-spacing:-.03em; }
    .muted { color:var(--muted); }
    .eyebrow { color:var(--brand); font-size:.78rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    .avatar { display:grid; place-items:center; width:42px; height:42px; border-radius:50%; background:#d8e0ff; color:#213b9d; font-weight:800; flex:0 0 auto; }
    .button { border:1px solid var(--line); background:var(--panel); color:var(--ink); border-radius:10px; padding:9px 13px; font-weight:700; }
    .button.primary { background:var(--brand); border-color:var(--brand); color:#fff; }
    .button.quiet { border-color:transparent; background:transparent; }
    .button[aria-pressed="true"] { background:var(--soft); border-color:#9eaff0; color:#18358f; }
    .nav-button { width:100%; display:flex; gap:10px; align-items:center; text-align:left; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); }
    .post { padding:18px; display:grid; grid-template-columns:auto 1fr; gap:12px; }
    .post + .post { border-top:1px solid var(--line); }
    .post h3 { font-size:1rem; margin:0; }
    .post p { margin:7px 0 0; }
    .post-meta { display:flex; gap:8px; align-items:baseline; flex-wrap:wrap; }
    .reason { margin-top:10px; color:#3851a3; font-size:.88rem; }
    .status { display:flex; gap:10px; align-items:flex-start; padding:12px 14px; background:#f0f8f4; color:#145f3e; border:1px solid #a8d5bf; border-radius:12px; }
    .composer { padding:16px; }
    .composer textarea { width:100%; min-height:92px; resize:vertical; border:1px solid var(--line); background:var(--panel); color:var(--ink); border-radius:12px; padding:12px; }
    .composer footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
    .tabs { display:flex; gap:6px; padding:4px; background:#e9ecf2; border-radius:12px; }
    .tabs button { flex:1; border:0; border-radius:9px; padding:9px; background:transparent; color:var(--muted); font-weight:800; }
    .tabs button[aria-selected="true"] { background:var(--panel); color:var(--ink); box-shadow:0 1px 3px #0002; }
    .empty { padding:40px 24px; text-align:center; }
    .prototype-bar { position:fixed; z-index:10; left:50%; bottom:16px; transform:translateX(-50%); display:flex; align-items:center; gap:10px; background:#111827; color:#fff; padding:8px; border-radius:999px; box-shadow:0 12px 30px #0005; }
    .prototype-bar button { border:0; border-radius:999px; background:#374151; color:#fff; min-width:42px; min-height:42px; }
    .prototype-bar strong { min-width:210px; text-align:center; }
    .prototype-only { color:#9ca3af; font-size:.75rem; }
    .variant { display:none; }
    .variant.active { display:block; }
    .a-grid { display:grid; grid-template-columns:220px minmax(420px,680px) minmax(230px,320px); gap:24px; max-width:1240px; margin:auto; padding:24px; }
    .a-rail { position:sticky; top:24px; height:calc(100vh - 48px); display:flex; flex-direction:column; gap:10px; }
    .a-rail .identity { margin-top:auto; padding-top:16px; border-top:1px solid var(--line); }
    .a-main { display:flex; flex-direction:column; gap:14px; }
    .a-aside { display:flex; flex-direction:column; gap:14px; }
    .aside-card { padding:16px; }
    .aside-card h2 { font-size:1rem; margin:0 0 8px; }
    .b-top { position:sticky; top:0; z-index:3; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px 24px; background:color-mix(in srgb,var(--panel) 92%,transparent); border-bottom:1px solid var(--line); backdrop-filter:blur(12px); }
    .b-wrap { max-width:920px; margin:auto; padding:28px 24px; }
    .b-heading { display:flex; align-items:end; justify-content:space-between; gap:20px; margin-bottom:20px; }
    .b-heading h1 { margin:0; font-size:2rem; letter-spacing:-.04em; }
    .b-stream { overflow:hidden; }
    .b-action { position:fixed; right:28px; bottom:90px; border:0; border-radius:50%; width:58px; height:58px; background:var(--brand); color:#fff; font-size:1.7rem; box-shadow:0 10px 25px #1d3ca855; }
    .c-grid { min-height:100vh; display:grid; grid-template-columns:76px minmax(0,1fr); }
    .c-dock { background:#172033; color:#fff; display:flex; flex-direction:column; align-items:center; gap:12px; padding:18px 10px; }
    .c-dock button { width:48px; height:48px; border:0; border-radius:14px; background:transparent; color:#d8deeb; }
    .c-dock button[aria-pressed="true"] { background:#fff; color:#172033; }
    .c-workspace { padding:24px; }
    .c-header { max-width:1100px; margin:auto auto 18px; display:flex; justify-content:space-between; align-items:center; gap:16px; }
    .c-columns { max-width:1100px; margin:auto; display:grid; grid-template-columns:minmax(0,1fr) 340px; gap:18px; }
    .c-side { display:flex; flex-direction:column; gap:14px; }
    .profile-preview { padding:20px; }
    .profile-preview .avatar { width:64px; height:64px; font-size:1.25rem; }
    .profile-preview h2 { margin:10px 0 0; }
    .setting { display:flex; align-items:start; justify-content:space-between; gap:14px; padding:14px 0; border-top:1px solid var(--line); }
    .switch { width:46px; height:26px; border:0; padding:3px; border-radius:999px; background:#9ca3af; }
    .switch::after { content:""; display:block; width:20px; height:20px; border-radius:50%; background:white; transition:transform .15s; }
    .switch[aria-checked="true"] { background:var(--brand); }
    .switch[aria-checked="true"]::after { transform:translateX(20px); }
    .view { display:none; }
    .view.active { display:block; }
    .view-switch { display:flex; gap:6px; flex-wrap:wrap; }
    @media (max-width:900px) {
      .a-grid { grid-template-columns:76px minmax(0,1fr); }
      .a-rail .label,.a-aside { display:none; }
      .a-rail { align-items:center; }
      .c-columns { grid-template-columns:1fr; }
      .c-side { order:-1; }
    }
    @media (max-width:620px) {
      .a-grid { display:block; padding:12px; }
      .a-rail { position:fixed; z-index:4; inset:auto 0 0; height:auto; flex-direction:row; justify-content:space-around; padding:8px; background:var(--panel); border-top:1px solid var(--line); }
      .a-rail .brand,.a-rail .identity,.a-rail .compose-label { display:none; }
      .a-main { padding-bottom:72px; }
      .b-top { padding:10px 14px; }
      .b-wrap { padding:18px 12px 90px; }
      .b-heading { align-items:start; flex-direction:column; }
      .c-grid { grid-template-columns:1fr; }
      .c-dock { position:fixed; z-index:4; inset:auto 0 0; flex-direction:row; justify-content:space-around; padding:8px; }
      .c-dock .brand { display:none; }
      .c-workspace { padding:14px 12px 90px; }
      .c-header { align-items:start; flex-direction:column; }
      .prototype-bar { bottom:74px; }
      .prototype-bar strong { min-width:150px; }
    }
    @media (prefers-reduced-motion:reduce) { *,*::before,*::after { scroll-behavior:auto!important; transition:none!important; } }
    @media (forced-colors:active) { .button,.card,.status,.tabs,.prototype-bar { border:1px solid CanvasText; } }
    @media (prefers-color-scheme:dark) { :root { --bg:#11151d; --panel:#1a202b; --ink:#f0f2f6; --muted:#a8b0bd; --line:#374151; --brand:#829bff; --soft:#202b4d; } .status { background:#102c20; color:#a5e2c3; } .reason { color:#aebdff; } .avatar { background:#2a3b71; color:#dce4ff; } .tabs { background:#10151d; } }
  </style>
</head>
<body>
  <a class="skip" href="#main">Skip to posts</a>
  <div class="shell" id="app"></div>
  <div class="prototype-bar" aria-label="Prototype variant switcher">
    <button id="prev" aria-label="Previous variant">←</button>
    <div><strong id="variant-label"></strong><div class="prototype-only">PROTOTYPE · arrow keys switch</div></div>
    <button id="next" aria-label="Next variant">→</button>
  </div>
  <script>
    const names={A:'Rail + context',B:'Calm stream',C:'Focused workspace'};
    const posts={following:[
      ['MA','Maya','@maya~2F8K','8 min','The neighborhood garden finally has tomatoes. I left a basket by the south gate for anyone nearby.'],
      ['JO','Jon','@jon~9Q2P','34 min','Small reminder: family dinner moved to 6:30 on Sunday.'],
      ['LI','Lina','@lina~4M7D','2 hr','I published my notes from today’s accessibility meetup. Keyboard testing caught more than our automated checks.']
    ],discover:[
      ['SA','Samir','@samir~7H3N','12 min','A simple community tool works better when people can understand why each suggestion appeared.','Recommended through Maya'],
      ['NO','Noor','@noor~6C1V','48 min','We are organizing a repair café this Saturday. Bring a broken appliance or just come learn.','Recommended through Jon → Priya']
    ]};
    let feed='following';
    function postList(kind){return `<section class="card b-stream" aria-label="${kind==='following'?'Following posts':'Discovered posts'}">${posts[kind].map(p=>`<article class="post"><div class="avatar" aria-hidden="true">${p[0]}</div><div><div class="post-meta"><h3>${p[1]}</h3><span class="muted">${p[2]} · ${p[3]}</span></div><p>${p[4]}</p>${p[5]?`<div class="reason">${p[5]} <button class="button quiet" aria-label="Why this post was recommended">Why?</button></div>`:''}</div></article>`).join('')}</section>`}
    function tabs(){return `<div class="tabs" role="tablist" aria-label="Feed"><button role="tab" data-feed="following" aria-selected="${feed==='following'}">Following</button><button role="tab" data-feed="discover" aria-selected="${feed==='discover'}">Discover</button></div>`}
    function composer(){return `<section class="card composer" aria-label="Create text post"><textarea aria-label="Post text" maxlength="500" placeholder="Share something with the people who follow you…"></textarea><footer><span class="muted">Text only · 500 characters</span><button class="button primary">Post</button></footer></section>`}
    function network(){return `<div class="status"><span aria-hidden="true">●</span><div><strong>Up to date</strong><div>Saved on this device · available from 2 peers</div></div></div>`}
    function emptyDiscover(){return `<section class="card empty"><div class="eyebrow">Your Discover feed</div><h2>Recommendations start with people you choose</h2><p class="muted">Enable “Use this person’s recommendations” on a profile, or preview a community starter pack.</p><button class="button primary">Browse starter packs</button></section>`}
    function content(){return feed==='discover'?postList('discover'):postList('following')}
    function variantA(){return `<div class="a-grid"><nav class="a-rail" aria-label="Primary"><div class="brand">Common</div><button class="button nav-button" data-feed="following" aria-pressed="${feed==='following'}"><span>⌂</span><span class="label">Following</span></button><button class="button nav-button" data-feed="discover" aria-pressed="${feed==='discover'}"><span>✦</span><span class="label">Discover</span></button><button class="button nav-button"><span>⌕</span><span class="label">Find people</span></button><button class="button primary nav-button"><span>＋</span><span class="compose-label">New post</span></button><div class="identity"><strong>Ayoub</strong><div class="muted">@ayoub~7K3M9Q</div></div></nav><main class="a-main" id="main">${tabs()}${composer()}${content()}</main><aside class="a-aside" aria-label="Context">${network()}<section class="card aside-card"><div class="eyebrow">Identity protected</div><h2>Recovery file verified</h2><p class="muted">Keep another copy somewhere safe.</p><button class="button">Recovery settings</button></section><section class="card aside-card"><h2>Why Discover is different</h2><p class="muted">Following is only people you chose. Discover uses recommendation sources you explicitly enable.</p></section></aside></div>`}
    function variantB(){return `<header class="b-top"><div class="brand">Common</div>${tabs()}<button class="button">Ayoub <span class="muted">@ayoub~7K3M9Q</span></button></header><main class="b-wrap" id="main"><div class="b-heading"><div><div class="eyebrow">${feed}</div><h1>${feed==='following'?'People you follow':'Discover through people you trust'}</h1><p class="muted">${feed==='following'?'Newest available posts. Nothing is ranked or filtered.':'Newest first, with a reason for every recommendation.'}</p></div><button class="button">Feed settings</button></div>${network()}<div style="height:14px"></div>${content()}</main><button class="b-action" aria-label="Create post">＋</button>`}
    function variantC(){return `<div class="c-grid"><nav class="c-dock" aria-label="Primary"><div class="brand">C</div><button data-feed="following" aria-pressed="${feed==='following'}" aria-label="Following">⌂</button><button data-feed="discover" aria-pressed="${feed==='discover'}" aria-label="Discover">✦</button><button aria-label="Find people">⌕</button><button aria-label="Settings">⚙</button></nav><main class="c-workspace" id="main"><header class="c-header"><div><div class="eyebrow">Common · ${feed}</div><h1 style="margin:2px 0">${feed==='following'?'Your circle':'Discover'}</h1></div><div class="view-switch"><button class="button">Find by invite</button><button class="button primary">Write post</button></div></header><div class="c-columns"><div>${content()}</div><aside class="c-side"><section class="card profile-preview"><div class="avatar">AY</div><h2>Ayoub</h2><div class="muted">@ayoub~7K3M9Q</div><div class="setting"><div><strong>Use recommendations</strong><div class="muted">People they trust may appear in Discover.</div></div><button class="switch" role="switch" aria-checked="true" aria-label="Use Ayoub's recommendations"></button></div></section>${network()}<section class="card aside-card"><h2>Clear by design</h2><p class="muted">No watch-time ranking. No ads. Following and Discover never mix.</p></section></aside></div></main></div>`}
    function render(){const v=new URLSearchParams(location.search).get('variant')||'A';document.querySelector('#app').innerHTML=v==='B'?variantB():v==='C'?variantC():variantA();document.querySelector('#variant-label').textContent=`${v} — ${names[v]}`;document.querySelectorAll('[data-feed]').forEach(b=>b.addEventListener('click',()=>{feed=b.dataset.feed;render()}));document.querySelectorAll('.switch').forEach(b=>b.addEventListener('click',()=>{b.setAttribute('aria-checked',b.getAttribute('aria-checked')!=='true')}));}
    function cycle(delta){const order=['A','B','C'];const current=new URLSearchParams(location.search).get('variant')||'A';const next=order[(order.indexOf(current)+delta+order.length)%order.length];const u=new URL(location.href);u.searchParams.set('variant',next);history.replaceState({},'',u);render();}
    document.querySelector('#prev').addEventListener('click',()=>cycle(-1));document.querySelector('#next').addEventListener('click',()=>cycle(1));
    addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName)||document.activeElement.isContentEditable)return;if(e.key==='ArrowLeft')cycle(-1);if(e.key==='ArrowRight')cycle(1)});
    render();
  </script>
</body>
</html>
